<!--
  =============================================
  ЛАДА АТАКОВА — ВХОД / РЕГИСТРАЦИЯ
  =============================================
  Supabase Auth + 152-ФЗ «О персональных данных»
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Атакова Лада</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #e8ecf1;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .login-container {
    background: #e8ecf1;
    border-radius: 20px;
    box-shadow: 8px 8px 20px rgba(163,175,194,0.4), -8px -8px 20px rgba(255,255,255,0.8);
    padding: 50px 40px;
    width: 100%;
    max-width: 440px;
  }
  .login-header { text-align: center; margin-bottom: 35px; }
  .avatar {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 50%; margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 6px 6px 15px rgba(163,175,194,0.4), -6px -6px 15px rgba(255,255,255,0.8);
  }
  .avatar svg { width: 40px; height: 40px; fill: #2d3748; }
  .login-header h1 { color: #2d3748; font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  .login-header p { color: #718096; font-size: 14px; }

  /* Табы */
  .auth-tabs { display: flex; gap: 5px; margin-bottom: 25px; }
  .auth-tab {
    flex: 1; padding: 10px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    background: #e8ecf1; color: #4a5568;
    box-shadow: 4px 4px 10px rgba(163,175,194,0.4), -4px -4px 10px rgba(255,255,255,0.7);
    transition: all 0.2s;
  }
  .auth-tab:active, .auth-tab.active {
    box-shadow: inset 3px 3px 6px rgba(163,175,194,0.5), inset -3px -3px 6px rgba(255,255,255,0.7);
  }

  .form-group { margin-bottom: 22px; }
  .form-group label {
    display: block; color: #4a5568; font-size: 13px; font-weight: 500;
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .input-wrapper { position: relative; }
  .input-wrapper svg {
    position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
    width: 20px; height: 20px; fill: #718096;
  }
  .form-group input {
    width: 100%; padding: 15px 20px 15px 50px;
    background: #e8ecf1; border: none; border-radius: 12px; font-size: 15px; color: #2d3748;
    box-shadow: inset 4px 4px 8px rgba(163,175,194,0.4), inset -4px -4px 8px rgba(255,255,255,0.8);
    transition: all 0.3s;
  }
  .form-group input:focus {
    outline: none;
    box-shadow: inset 4px 4px 8px rgba(163,175,194,0.5), inset -4px -4px 8px rgba(255,255,255,0.9), 0 0 0 3px rgba(102,126,234,0.2);
  }

  /* Согласие 152-ФЗ */
  .consent-group {
    margin-bottom: 20px;
    padding: 15px;
    background: #e8ecf1;
    border-radius: 12px;
    box-shadow: inset 3px 3px 6px rgba(163,175,194,0.3), inset -3px -3px 6px rgba(255,255,255,0.6);
  }
  .consent-group label {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 12px; color: #4a5568; line-height: 1.5; cursor: pointer;
    text-transform: none; letter-spacing: 0; margin-bottom: 0;
  }
  .consent-group input[type="checkbox"] {
    width: 18px; height: 18px; min-width: 18px; margin-top: 2px;
    accent-color: #667eea; cursor: pointer;
  }
  .consent-group a { color: #667eea; text-decoration: none; }
  .consent-group a:hover { text-decoration: underline; }

  .btn-login {
    width: 100%; padding: 16px; background: #e8ecf1; border: none; border-radius: 12px;
    color: #2d3748; font-size: 16px; font-weight: 600; cursor: pointer;
    box-shadow: 6px 6px 14px rgba(163,175,194,0.55), -6px -6px 14px rgba(255,255,255,0.9);
    transition: all 0.2s; margin-top: 5px;
  }
  .btn-login:hover { box-shadow: 8px 8px 20px rgba(163,175,194,0.65), -8px -8px 20px rgba(255,255,255,1); }
  .btn-login:active { box-shadow: inset 4px 4px 8px rgba(163,175,194,0.55), inset -4px -4px 8px rgba(255,255,255,0.7); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

  .form-footer { text-align: center; margin-top: 25px; }
  .form-footer a { color: #667eea; text-decoration: none; font-size: 14px; }
  .form-footer a:hover { text-decoration: underline; }

  .error-msg {
    background: #fed7d7; color: #c53030; padding: 12px 15px; border-radius: 10px;
    font-size: 14px; margin-bottom: 20px; display: none;
    box-shadow: 3px 3px 8px rgba(163,175,194,0.3), -3px -3px 8px rgba(255,255,255,0.5);
  }
  .error-msg.show { display: block; }

  .success-msg {
    background: #c6f6d5; color: #276749; padding: 12px 15px; border-radius: 10px;
    font-size: 14px; margin-bottom: 20px; display: none;
    box-shadow: 3px 3px 8px rgba(163,175,194,0.3), -3px -3px 8px rgba(255,255,255,0.5);
  }
  .success-msg.show { display: block; }

  .auth-form { display: none; }
  .auth-form.active { display: block; }

  @media (max-width: 480px) {
    .login-container { padding: 35px 25px; }
    .login-header h1 { font-size: 20px; }
  }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="avatar">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <h1>Добро пожаловать</h1>
      <p>Войдите в свой аккаунт</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Вход</button>
      <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <!-- Форма входа -->
    <form id="loginForm" class="auth-form active">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          <input type="email" id="loginEmail" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="form-group">
        <label for="loginPassword">Пароль</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Войти</button>
      <div class="form-footer">
        <a href="#" onclick="showResetForm(); return false;">Забыли пароль?</a>
      </div>
    </form>

    <!-- Форма регистрации (152-ФЗ) -->
    <form id="registerForm" class="auth-form">
      <div class="form-group">
        <label for="regName">Имя</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <input type="text" id="regName" placeholder="Ваше имя" required>
        </div>
      </div>
      <div class="form-group">
        <label for="regEmail">Email</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          <input type="email" id="regEmail" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="form-group">
        <label for="regPhone">Телефон</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
          <input type="tel" id="regPhone" placeholder="+7 (___) ___-__-__">
        </div>
      </div>
      <div class="form-group">
        <label for="regPassword">Пароль</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          <input type="password" id="regPassword" placeholder="Минимум 8 символов" minlength="8" required>
        </div>
      </div>

      <div class="consent-group">
        <label>
          <input type="checkbox" id="consentPD" required>
          <span>
            Я даю согласие на обработку моих <strong>персональных данных</strong> в соответствии с
            <a href="#" onclick="alert('Политика конфиденциальности: Ваши данные хранятся в защищённом виде и используются только для предоставления услуг. Оператор: ИП Атакова Л.В. Для вопросов: support@lada-atakova.ru'); return false;">Политикой конфиденциальности</a>
            и Федеральным законом №152-ФЗ «О персональных данных».
          </span>
        </label>
      </div>

      <div class="consent-group">
        <label>
          <input type="checkbox" id="consentTerms" required>
          <span>
            Я принимаю условия <a href="#" onclick="alert('Пользовательское соглашение: Регистрируясь, вы соглашаетесь получать информационные рассылки о услугах нутрициолога. Вы можете отписаться в любой момент.'); return false;">Пользовательского соглашения</a>
            и даю согласие на получение информационных сообщений.
          </span>
        </label>
      </div>

      <button type="submit" class="btn-login" id="registerBtn">Зарегистрироваться</button>
      <div class="form-footer">
        <p style="font-size: 12px; color: #a0aec0; margin-top: 10px;">
          Регистрируясь, вы подтверждаете, что вам исполнилось 18 лет
        </p>
      </div>
    </form>

    <!-- Форма восстановления пароля -->
    <form id="resetForm" class="auth-form">
      <p style="color: #718096; font-size: 14px; margin-bottom: 20px; text-align: center;">
        Введите email. Мы отправим ссылку для сброса пароля.
      </p>
      <div class="form-group">
        <label for="resetEmail">Email</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          <input type="email" id="resetEmail" placeholder="your@email.com" required>
        </div>
      </div>
      <button type="submit" class="btn-login" id="resetBtn">Отправить ссылку</button>
      <div class="form-footer">
        <a href="#" onclick="switchTab('login'); return false;">← Вернуться к входу</a>
      </div>
    </form>
  </div>

  <script>
  // Supabase конфигурация
  var SUPABASE_URL = 'https://rrejiqxtlgrjfftomlr.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_KDP-JnzehDj-juiGf3FZHg_7MzqvYxQ';
  var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.auth-form').forEach(function(f) { f.classList.remove('active'); });
    event.target.classList.add('active');
    document.getElementById(tab + 'Form').classList.add('active');
    hideMessages();
  }

  function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.className = 'error-msg show';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    var el = document.getElementById('successMsg');
    el.textContent = msg;
    el.className = 'success-msg show';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showResetForm() {
    document.querySelectorAll('.auth-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.auth-form').forEach(function(f) { f.classList.remove('active'); });
    document.getElementById('resetForm').classList.add('active');
    hideMessages();
  }

  function setLoading(btnId, loading) {
    var btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Загрузка...' : btn.dataset.originalText;
  }

  // Инициализация текста кнопок
  document.querySelectorAll('.btn-login').forEach(function(btn) {
    btn.dataset.originalText = btn.textContent;
  });

  // Вход
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    hideMessages();
    setLoading('loginBtn', true);

    var email = document.getElementById('loginEmail').value;
    var password = document.getElementById('loginPassword').value;

    supabase.auth.signInWithPassword({ email: email, password: password })
      .then(function(result) {
        if (result.error) throw result.error;
        // Переход в приложение
        window.location.href = 'app.html';
      })
      .catch(function(err) {
        showError(err.message === 'Invalid login credentials' ? 'Неверный email или пароль' : err.message);
        setLoading('loginBtn', false);
      });
  });

  // Регистрация
  document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    hideMessages();

    if (!document.getElementById('consentPD').checked) {
      showError('Необходимо дать согласие на обработку персональных данных');
      return;
    }
    if (!document.getElementById('consentTerms').checked) {
      showError('Необходимо принять условия пользовательского соглашения');
      return;
    }

    setLoading('registerBtn', true);

    var name = document.getElementById('regName').value;
    var email = document.getElementById('regEmail').value;
    var phone = document.getElementById('regPhone').value;
    var password = document.getElementById('regPassword').value;

    supabase.auth.signUp({
      email: email,
      password: password,
      options: {
        data: {
          full_name: name,
          phone: phone,
          consent_personal_data: true,
          consent_processing: true
        }
      }
    }).then(function(result) {
      if (result.error) throw result.error;
      showSuccess('Регистрация успешна! Проверьте email для подтверждения.');
      setTimeout(function() { switchTab('login'); }, 2000);
      setLoading('registerBtn', false);
    }).catch(function(err) {
      showError(err.message);
      setLoading('registerBtn', false);
    });
  });

  // Восстановление пароля
  document.getElementById('resetForm').addEventListener('submit', function(e) {
    e.preventDefault();
    hideMessages();
    setLoading('resetBtn', true);

    var email = document.getElementById('resetEmail').value;

    supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/lada-nutrition/app.html'
    }).then(function(result) {
      if (result.error) throw result.error;
      showSuccess('Ссылка отправлена на email!');
      setLoading('resetBtn', false);
    }).catch(function(err) {
      showError(err.message);
      setLoading('resetBtn', false);
    });
  });
  </script>
</body>
</html>
